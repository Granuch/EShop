      RabbitMQ__Port: "5672"
      RabbitMQ__Username: ${RABBITMQ_USERNAME}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}

      # Seq (centralized logging)
      Serilog__WriteTo__2__Name: Seq
      Serilog__WriteTo__2__Args__serverUrl: http://seq:5341

      # JWT
      JwtSettings__SecretKey: ${JWT_SECRET_KEY}
      JwtSettings__Issuer: ${JWT_ISSUER}
      JwtSettings__Audience: ${JWT_AUDIENCE}

      # CORS
      Cors__AllowedOrigins__0: ${CORS_ORIGIN_1:-http://localhost:3000}
      Cors__AllowedOrigins__1: ${CORS_ORIGIN_2:-https://localhost:3000}

      # OpenTelemetry (traces go to OTEL Collector, which forwards to Jaeger)
      OpenTelemetry__Enabled: "true"
      OpenTelemetry__OtlpEndpoint: http://otel-collector:4317
      OpenTelemetry__SamplingRatio: "${OTEL_SAMPLING_RATIO:-0.1}"
      OpenTelemetry__MetricsEnabled: "true"

      # Serilog
      Serilog__MinimumLevel__Default: ${LOG_LEVEL:-Information}
    ports:
      - "${BASKET_API_PORT:-7006}:8080"
    volumes:
      - basket-logs:/app/logs
    networks:
      - eshop-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles:
      - production
      - sandbox

  # ============================================
  # Catalog API
  # ============================================
  catalog-api:
    build:
      context: .
      dockerfile: src/Services/Catalog/EShop.Catalog.API/Dockerfile
    container_name: eshop-catalog-api
    restart: unless-stopped
    depends_on:
