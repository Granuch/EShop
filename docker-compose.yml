  payment-postgres:
    image: postgres:16-alpine
    container_name: eshop-payment-postgres
    restart: unless-stopped
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_DB: ${PAYMENT_POSTGRES_DB:-eshop_payment}
      POSTGRES_USER: ${PAYMENT_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${PAYMENT_POSTGRES_PASSWORD:-postgres}
    ports:
      - "${PAYMENT_POSTGRES_PORT:-5436}:5432"
    volumes:
