# ============================================
# EShop Microservices - Complete Stack
# All services in one docker-compose
# ============================================

services:
  # ============================================
  # PostgreSQL Database for Identity
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: eshop-identity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eshop_identity}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qweasdz1}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - eshop-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================
  # Redis Cache for Brute-Force Protection
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: eshop-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-4ZA2nxObXTHmLKVFvUcM6IeqDBQaGhuf}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - eshop-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ============================================
  # RabbitMQ Message Broker
  # ============================================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: eshop-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"       # AMQP protocol
      - "${RABBITMQ_MGMT_PORT:-15672}:15672" # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - eshop-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ============================================
  # Jaeger - Distributed Tracing
  # ============================================
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: eshop-jaeger
    restart: unless-stopped
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"         # Jaeger UI
      - "${JAEGER_OTLP_GRPC_PORT:-4317}:4317"    # OTLP gRPC receiver
      - "${JAEGER_OTLP_HTTP_PORT:-4318}:4318"    # OTLP HTTP receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
    volumes:
      - jaeger-data:/badger
    networks:
      - eshop-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:16687/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    profiles:
      - monitoring
      - sandbox

  # ============================================
  # PostgreSQL Database for Catalog
  # ============================================
  catalog-postgres:
    image: postgres:16-alpine
    container_name: eshop-catalog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${CATALOG_POSTGRES_DB:-eshop_catalog}
      POSTGRES_USER: ${CATALOG_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${CATALOG_POSTGRES_PASSWORD:-postgres}
    ports:
      - "${CATALOG_POSTGRES_PORT:-5433}:5432"
    volumes:
      - catalog-postgres-data:/var/lib/postgresql/data
    networks:
      - eshop-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CATALOG_POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================
  # Identity API - Instance 1
  # ============================================
  identity-api:
    build:
      context: .
      dockerfile: src/Services/Identity/EShop.Identity.API/Dockerfile
    image: eshop/identity-api:latest
    container_name: eshop-identity-api-1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      # ASP.NET Core
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080

      # Database
      ConnectionStrings__IdentityDb: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-eshop_identity};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-qweasdz1}"

      # Redis
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-4ZA2nxObXTHmLKVFvUcM6IeqDBQaGhuf},ssl=false,abortConnect=false,connectTimeout=5000,syncTimeout=5000,connectRetry=3"

      # RabbitMQ
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: ${RABBITMQ_USER:-guest}
      RabbitMQ__Password: ${RABBITMQ_PASS:-guest}

      # Seq (centralized logging)
      Serilog__WriteTo__1__Name: Seq
      Serilog__WriteTo__1__Args__serverUrl: http://seq:5341

      # JWT
      JwtSettings__SecretKey: ${JWT_SECRET_KEY:-duHbxp5ADlMhUk95kPVwdk8tgml3vVF0cDSSZ4KfaupX8oxJ3erikMDLHiFKj0gxOKis2mlaStiHSlbglngbjy}
      JwtSettings__Issuer: ${JWT_ISSUER:-EShop.Identity}
      JwtSettings__Audience: ${JWT_AUDIENCE:-EShop.Services}
      JwtSettings__AccessTokenExpirationMinutes: ${JWT_ACCESS_TOKEN_EXPIRATION:-60}
      JwtSettings__RefreshTokenExpirationDays: ${JWT_REFRESH_TOKEN_EXPIRATION:-7}

      # CORS
      Cors__AllowedOrigins__0: ${CORS_ORIGIN_1:-http://localhost:3000}
      Cors__AllowedOrigins__1: ${CORS_ORIGIN_2:-https://localhost:3000}

      # OpenTelemetry
      OpenTelemetry__Enabled: "true"
      OpenTelemetry__OtlpEndpoint: http://jaeger:4317
      OpenTelemetry__SamplingRatio: "${OTEL_SAMPLING_RATIO:-1.0}"
      OpenTelemetry__MetricsEnabled: "true"

      # Serilog
      Serilog__MinimumLevel__Default: ${LOG_LEVEL:-Information}
    ports:
      - "${IDENTITY_API_PORT_1:-7001}:8080"
    volumes:
      - identity-logs:/app/logs
    networks:
      - eshop-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles:
      - production

  # ============================================
  # Catalog API
  # ============================================
  catalog-api:
    build:
      context: .
      dockerfile: src/Services/Catalog/EShop.Catalog.API/Dockerfile
    image: eshop/catalog-api:latest
    container_name: eshop-catalog-api
    restart: unless-stopped
    depends_on:
      catalog-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      # ASP.NET Core
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080

      # Database
      ConnectionStrings__CatalogDb: "Host=catalog-postgres;Port=5432;Database=${CATALOG_POSTGRES_DB:-eshop_catalog};Username=${CATALOG_POSTGRES_USER:-postgres};Password=${CATALOG_POSTGRES_PASSWORD:-postgres}"

      # Redis
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-4ZA2nxObXTHmLKVFvUcM6IeqDBQaGhuf},ssl=false,abortConnect=false,connectTimeout=5000,syncTimeout=5000,connectRetry=3"

      # RabbitMQ
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: ${RABBITMQ_USER:-guest}
      RabbitMQ__Password: ${RABBITMQ_PASS:-guest}

      # Seq (centralized logging)
      Serilog__WriteTo__2__Name: Seq
      Serilog__WriteTo__2__Args__serverUrl: http://seq:5341

      # JWT
      JwtSettings__SecretKey: ${JWT_SECRET_KEY:-duHbxp5ADlMhUk95kPVwdk8tgml3vVF0cDSSZ4KfaupX8oxJ3erikMDLHiFKj0gxOKis2mlaStiHSlbglngbjy}
      JwtSettings__Issuer: ${JWT_ISSUER:-EShop.Identity}
      JwtSettings__Audience: ${JWT_AUDIENCE:-EShop.Services}

      # CORS
      Cors__AllowedOrigins__0: ${CORS_ORIGIN_1:-http://localhost:3000}
      Cors__AllowedOrigins__1: ${CORS_ORIGIN_2:-https://localhost:3000}

      # OpenTelemetry
      OpenTelemetry__Enabled: "true"
      OpenTelemetry__OtlpEndpoint: http://jaeger:4317
      OpenTelemetry__SamplingRatio: "${OTEL_SAMPLING_RATIO:-1.0}"
      OpenTelemetry__MetricsEnabled: "true"

      # Serilog
      Serilog__MinimumLevel__Default: ${LOG_LEVEL:-Information}
    ports:
      - "${CATALOG_API_PORT:-7004}:8080"
    volumes:
      - catalog-logs:/app/logs
    networks:
      - eshop-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles:
      - production

  # ============================================
  # Catalog API - Sandbox (Full test environment with seeding)
  # ============================================
  catalog-api-sandbox:
    build:
      context: .
      dockerfile: src/Services/Catalog/EShop.Catalog.API/Dockerfile
    image: eshop/catalog-api:latest
    container_name: eshop-catalog-api-sandbox
    restart: unless-stopped
    depends_on:
      catalog-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      seq:
        condition: service_started
    environment:
      # Sandbox environment - includes full monitoring
      ASPNETCORE_ENVIRONMENT: Sandbox
      ASPNETCORE_URLS: http://+:8080

      # Database
      ConnectionStrings__CatalogDb: "Host=catalog-postgres;Port=5432;Database=${CATALOG_POSTGRES_DB:-eshop_catalog};Username=${CATALOG_POSTGRES_USER:-postgres};Password=${CATALOG_POSTGRES_PASSWORD:-postgres}"

      # Redis
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-4ZA2nxObXTHmLKVFvUcM6IeqDBQaGhuf},ssl=false,abortConnect=false,connectTimeout=5000,syncTimeout=5000,connectRetry=3"

      # RabbitMQ
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: ${RABBITMQ_USER:-guest}
      RabbitMQ__Password: ${RABBITMQ_PASS:-guest}

      # Seq (centralized logging)
      Serilog__WriteTo__2__Name: Seq
      Serilog__WriteTo__2__Args__serverUrl: http://seq:5341

      # JWT - Use same keys as production for testing
      JwtSettings__SecretKey: ${JWT_SECRET_KEY:-duHbxp5ADlMhUk95kPVwdk8tgml3vVF0cDSSZ4KfaupX8oxJ3erikMDLHiFKj0gxOKis2mlaStiHSlbglngbjy}
      JwtSettings__Issuer: ${JWT_ISSUER:-EShop.Identity}
      JwtSettings__Audience: ${JWT_AUDIENCE:-EShop.Services}

      # CORS - Allow all for testing
      Cors__AllowedOrigins__0: ${CORS_ORIGIN_1:-http://localhost:3000}
      Cors__AllowedOrigins__1: ${CORS_ORIGIN_2:-https://localhost:3000}

      # OpenTelemetry
      OpenTelemetry__Enabled: "true"
      OpenTelemetry__OtlpEndpoint: http://jaeger:4317
      OpenTelemetry__SamplingRatio: "1.0"
      OpenTelemetry__MetricsEnabled: "true"

      # Logging - Debug level for sandbox
      Serilog__MinimumLevel__Default: Debug
    ports:
      - "${CATALOG_API_SANDBOX_PORT:-7005}:8080"
    volumes:
      - catalog-logs-sandbox:/app/logs
    networks:
      - eshop-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles:
      - sandbox

  # ============================================
  # Identity API - Instance 2 (for multi-instance testing)
  # ============================================
  identity-api-2:
    build:
      context: .
      dockerfile: src/Services/Identity/EShop.Identity.API/Dockerfile
    image: eshop/identity-api:latest
    container_name: eshop-identity-api-2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__IdentityDb: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-eshop_identity};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-qweasdz1}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-4ZA2nxObXTHmLKVFvUcM6IeqDBQaGhuf},ssl=false,abortConnect=false,connectTimeout=5000,syncTimeout=5000,connectRetry=3"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: ${RABBITMQ_USER:-guest}
      RabbitMQ__Password: ${RABBITMQ_PASS:-guest}
      Serilog__WriteTo__1__Name: Seq
      Serilog__WriteTo__1__Args__serverUrl: http://seq:5341
      JwtSettings__SecretKey: ${JWT_SECRET_KEY:-duHbxp5ADlMhUk95kPVwdk8tgml3vVF0cDSSZ4KfaupX8oxJ3erikMDLHiFKj0gxOKis2mlaStiHSlbglngbjy}
      JwtSettings__Issuer: ${JWT_ISSUER:-EShop.Identity}
      JwtSettings__Audience: ${JWT_AUDIENCE:-EShop.Services}
      JwtSettings__AccessTokenExpirationMinutes: ${JWT_ACCESS_TOKEN_EXPIRATION:-60}
      JwtSettings__RefreshTokenExpirationDays: ${JWT_REFRESH_TOKEN_EXPIRATION:-7}
      Cors__AllowedOrigins__0: ${CORS_ORIGIN_1:-http://localhost:3000}
      Cors__AllowedOrigins__1: ${CORS_ORIGIN_2:-https://localhost:3000}
      Serilog__MinimumLevel__Default: ${LOG_LEVEL:-Information}
      OpenTelemetry__Enabled: "true"
      OpenTelemetry__OtlpEndpoint: http://jaeger:4317
      OpenTelemetry__SamplingRatio: "${OTEL_SAMPLING_RATIO:-1.0}"
      OpenTelemetry__MetricsEnabled: "true"
    ports:
      - "${IDENTITY_API_PORT_2:-7002}:8080"
    volumes:
      - identity-logs-2:/app/logs
    networks:
      - eshop-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles:
      - production
      - multi-instance

  # ============================================
  # Identity API - Sandbox (Full test environment with seeding)
  # ============================================
  identity-api-sandbox:
    build:
      context: .
      dockerfile: src/Services/Identity/EShop.Identity.API/Dockerfile
    image: eshop/identity-api:latest
    container_name: eshop-identity-api-sandbox
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      seq:
        condition: service_started
    environment:
      # Sandbox environment - includes seeding and full monitoring
      ASPNETCORE_ENVIRONMENT: Sandbox
      ASPNETCORE_URLS: http://+:8080

      # Database
      ConnectionStrings__IdentityDb: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-eshop_identity};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-qweasdz1}"

      # Redis
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-4ZA2nxObXTHmLKVFvUcM6IeqDBQaGhuf},ssl=false,abortConnect=false,connectTimeout=5000,syncTimeout=5000,connectRetry=3"

      # RabbitMQ
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: ${RABBITMQ_USER:-guest}
      RabbitMQ__Password: ${RABBITMQ_PASS:-guest}

      # Seq (centralized logging)
      Serilog__WriteTo__1__Name: Seq
      Serilog__WriteTo__1__Args__serverUrl: http://seq:5341

      # JWT - Use same keys as production for testing
      JwtSettings__SecretKey: ${JWT_SECRET_KEY:-duHbxp5ADlMhUk95kPVwdk8tgml3vVF0cDSSZ4KfaupX8oxJ3erikMDLHiFKj0gxOKis2mlaStiHSlbglngbjy}
      JwtSettings__Issuer: ${JWT_ISSUER:-EShop.Identity}
      JwtSettings__Audience: ${JWT_AUDIENCE:-EShop.Services}
      JwtSettings__AccessTokenExpirationMinutes: ${JWT_ACCESS_TOKEN_EXPIRATION:-60}
      JwtSettings__RefreshTokenExpirationDays: ${JWT_REFRESH_TOKEN_EXPIRATION:-7}

      # CORS - Allow all for testing
      Cors__AllowedOrigins__0: ${CORS_ORIGIN_1:-http://localhost:3000}
      Cors__AllowedOrigins__1: ${CORS_ORIGIN_2:-https://localhost:3000}

      # OpenTelemetry
      OpenTelemetry__Enabled: "true"
      OpenTelemetry__OtlpEndpoint: http://jaeger:4317
      OpenTelemetry__SamplingRatio: "1.0"
      OpenTelemetry__MetricsEnabled: "true"

      # Logging - Debug level for sandbox
      Serilog__MinimumLevel__Default: Debug
    ports:
      - "${IDENTITY_API_SANDBOX_PORT:-7003}:8080"
    volumes:
      - identity-logs-sandbox:/app/logs
    networks:
      - eshop-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles:
      - sandbox

  # ============================================
  # Redis Exporter (Prometheus Metrics)
  # ============================================
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: eshop-redis-exporter
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-4ZA2nxObXTHmLKVFvUcM6IeqDBQaGhuf}
    ports:
      - "${REDIS_EXPORTER_PORT:-9121}:9121"
    networks:
      - eshop-network
    profiles:
      - monitoring
      - sandbox

  # ============================================
  # RedisInsight - Modern Redis GUI (recommended)
  # ============================================
  redis-insight:
    image: redis/redisinsight:latest
    container_name: eshop-redis-insight
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      # RedisInsight configuration
      REDISINSIGHT_HOST: 0.0.0.0
      REDISINSIGHT_PORT: 5540
    ports:
      - "${REDIS_INSIGHT_PORT:-8001}:5540"
    volumes:
      - redis-insight-data:/data
    networks:
      - eshop-network
    profiles:
      - development
      - monitoring
      - sandbox

  # ============================================
  # Redis Commander (Web UI for Redis - alternative)
  # ============================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: eshop-redis-commander
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-4ZA2nxObXTHmLKVFvUcM6IeqDBQaGhuf}
    ports:
      - "${REDIS_COMMANDER_PORT:-8081}:8081"
    networks:
      - eshop-network
    profiles:
      - development
      - monitoring
      - sandbox

  # ============================================
  # Seq - Centralized Structured Logging
  # ============================================
  seq:
    image: datalust/seq:2025.1
    container_name: eshop-seq
    restart: unless-stopped
    ports:
      - "${SEQ_UI_PORT:-5341}:80"      # Web UI and ingestion
      - "${SEQ_INGEST_PORT:-5342}:5341" # Ingestion only
    environment:
      ACCEPT_EULA: Y
    volumes:
      - seq-data:/data
    networks:
      - eshop-network
    profiles:
      - monitoring
      - sandbox

  # ============================================
  # Prometheus (Metrics Collection)
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: eshop-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      # Use existing infrastructure config if available, fallback to monitoring
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus-alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    networks:
      - eshop-network
    profiles:
      - monitoring
      - sandbox

  # ============================================
  # Grafana (Visualization)
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: eshop-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - seq
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: false
      GF_INSTALL_PLUGINS: yesoreyeram-infinity-datasource
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      # Use existing infrastructure config if available, fallback to monitoring
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - eshop-network
    profiles:
      - monitoring
      - sandbox

# ============================================
# Networks
# ============================================
networks:
  eshop-network:
    name: eshop-network
    driver: bridge

# ============================================
# Volumes
# ============================================
volumes:
  postgres-data:
    name: eshop-postgres-data
  catalog-postgres-data:
    name: eshop-catalog-postgres-data
  rabbitmq-data:
    name: eshop-rabbitmq-data
  redis-data:
    name: eshop-redis-data
  redis-insight-data:
    name: eshop-redis-insight-data
  identity-logs:
    name: eshop-identity-logs
  catalog-logs:
    name: eshop-catalog-logs
  catalog-logs-sandbox:
    name: eshop-catalog-logs-sandbox
  identity-logs-2:
    name: eshop-identity-logs-2
  identity-logs-sandbox:
    name: eshop-identity-logs-sandbox
  seq-data:
    name: eshop-seq-data
  prometheus-data:
    name: eshop-prometheus-data
  grafana-data:
    name: eshop-grafana-data
  jaeger-data:
    name: eshop-jaeger-data
