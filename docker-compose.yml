    container_name: eshop-payment-api
    restart: unless-stopped
    depends_on:
      payment-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Sandbox}
      ASPNETCORE_URLS: http://+:8080

      ConnectionStrings__PaymentDb: "Host=payment-postgres;Port=5432;Database=${PAYMENT_POSTGRES_DB:-eshop_payment};Username=${PAYMENT_POSTGRES_USER:-postgres};Password=${PAYMENT_POSTGRES_PASSWORD:-postgres};MaxPoolSize=40;Timeout=30;Command Timeout=30"

      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: ${RABBITMQ_USERNAME}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}

      JwtSettings__SecretKey: ${JWT_SECRET_KEY}
      JwtSettings__Issuer: ${JWT_ISSUER}
      JwtSettings__Audience: ${JWT_AUDIENCE}

      PaymentSimulation__ProcessingDelayMinSeconds: ${PAYMENT_PROCESSING_DELAY_MIN_SECONDS:-1}
      PaymentSimulation__ProcessingDelayMaxSeconds: ${PAYMENT_PROCESSING_DELAY_MAX_SECONDS:-3}
      PaymentSimulation__SuccessRatePercent: ${PAYMENT_SUCCESS_RATE_PERCENT:-80}
      PaymentSimulation__RefundDelaySeconds: ${PAYMENT_REFUND_DELAY_SECONDS:-2}

      OpenTelemetry__Enabled: "true"
      OpenTelemetry__OtlpEndpoint: http://otel-collector:4317
      OpenTelemetry__SamplingRatio: "${OTEL_SAMPLING_RATIO:-0.1}"
