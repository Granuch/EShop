# ============================================
# EShop Microservices - Complete Stack
# All services in one docker-compose
# ============================================

services:
  # ============================================
  # PostgreSQL Database for Identity
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: eshop-identity-postgres
    restart: unless-stopped
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/identity-postgresql.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - eshop-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================
  # Redis Cache for Brute-Force Protection
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: eshop-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - eshop-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ============================================
  # RabbitMQ Message Broker
  # ============================================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: eshop-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"       # AMQP protocol
      - "${RABBITMQ_MGMT_PORT:-15672}:15672" # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - eshop-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ============================================
  # OpenTelemetry Collector
  # Receives traces from services, generates span-derived RED metrics
  # via spanmetrics connector, forwards traces to Jaeger.
  # ============================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.146.1
    container_name: eshop-otel-collector
    restart: unless-stopped
    depends_on:
      jaeger:
        condition: service_healthy
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./infrastructure/otel-collector/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"      # OTLP gRPC receiver
      - "${OTEL_HTTP_PORT:-4318}:4318"      # OTLP HTTP receiver
    networks:
      - eshop-network
    profiles:
      - monitoring

  # ============================================
  # Jaeger - Distributed Tracing + SPM
  # Receives traces from OTEL Collector.
  # Monitor tab reads span-derived metrics from Prometheus.
  # ============================================
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: eshop-jaeger
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"         # Jaeger UI
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
      # SPM (Service Performance Monitoring) — enables the Monitor tab
      METRICS_STORAGE_TYPE: prometheus
      PROMETHEUS_SERVER_URL: http://prometheus:9090
      PROMETHEUS_QUERY_NORMALIZE_CALLS: "true"
      PROMETHEUS_QUERY_NORMALIZE_DURATION: "true"
      PROMETHEUS_QUERY_DURATION_UNIT: ms
    volumes:
      - jaeger-data:/badger
    networks:
      - eshop-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:14269/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    profiles:
      - monitoring

  # ============================================
  # PostgreSQL Database for Catalog
  # ============================================
  catalog-postgres:
    image: postgres:16-alpine
    container_name: eshop-catalog-postgres
    restart: unless-stopped
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_DB: ${CATALOG_POSTGRES_DB}
      POSTGRES_USER: ${CATALOG_POSTGRES_USER}
      POSTGRES_PASSWORD: ${CATALOG_POSTGRES_PASSWORD}
    ports:
      - "${CATALOG_POSTGRES_PORT:-5433}:5432"
    volumes:
      - catalog-postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/catalog-postgresql.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - eshop-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CATALOG_POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================
  # Identity API - Instance 1
  # ============================================
  identity-api:
    build:
      context: .
      dockerfile: src/Services/Identity/EShop.Identity.API/Dockerfile
    container_name: eshop-identity-api-1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      # ASP.NET Core
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Sandbox}
      ASPNETCORE_URLS: http://+:8080

      # Database
      ConnectionStrings__IdentityDb: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};MaxPoolSize=40;Timeout=30;Command Timeout=30"

      # Redis
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD},ssl=false,abortConnect=false,connectTimeout=5000,syncTimeout=5000,connectRetry=3"

      # RabbitMQ
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: ${RABBITMQ_USERNAME:-guest}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD:-guest}

      # Seq (centralized logging)
      Serilog__WriteTo__1__Name: Seq
      Serilog__WriteTo__1__Args__serverUrl: http://seq:5341

      # Internal service authorization
      InternalServiceAuth__ApiKey: ${INTERNAL_SERVICE_API_KEY:-LOCAL_internal_service_api_key}
      InternalServiceAuth__HeaderName: ${INTERNAL_SERVICE_API_KEY_HEADER:-X-Internal-Api-Key}

      # JWT
      JwtSettings__SecretKey: ${JWT_SECRET_KEY}
      JwtSettings__Issuer: ${JWT_ISSUER}
      JwtSettings__Audience: ${JWT_AUDIENCE}
      JwtSettings__AccessTokenExpirationMinutes: ${JWT_ACCESS_TOKEN_EXPIRATION:-60}
      JwtSettings__RefreshTokenExpirationDays: ${JWT_REFRESH_TOKEN_EXPIRATION:-7}

      # Identity
      Identity__RequireConfirmedEmail: ${IDENTITY_REQUIRE_CONFIRMED_EMAIL:-false}

      # Seed Admin (Development/Sandbox only)
      Identity__SeedAdminEmail: ${IDENTITY_SEED_ADMIN_EMAIL:-admin@eshop.com}
      Identity__SeedAdminPassword: ${IDENTITY_SEED_ADMIN_PASSWORD:-}

      # CORS
      Cors__AllowedOrigins__0: ${CORS_ORIGIN_1:-http://localhost:3000}
      Cors__AllowedOrigins__1: ${CORS_ORIGIN_2:-https://localhost:3000}

      # OpenTelemetry (traces go to OTEL Collector, which forwards to Jaeger)
      OpenTelemetry__Enabled: "true"
      OpenTelemetry__OtlpEndpoint: http://otel-collector:4317
      OpenTelemetry__SamplingRatio: "${OTEL_SAMPLING_RATIO:-0.1}"
      OpenTelemetry__MetricsEnabled: "true"

      # Serilog
      Serilog__MinimumLevel__Default: ${LOG_LEVEL:-Information}
    ports:
      - "${IDENTITY_API_PORT_1:-7001}:8080"
    volumes:
      - identity-logs:/app/logs
    networks:
      - eshop-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles:
      - production
      - sandbox

  # ============================================
  # Basket API
  # ============================================
  basket-api:
