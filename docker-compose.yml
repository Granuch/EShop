  # ============================================
  # Mailpit (local SMTP catcher for development)
  # ============================================
  mailpit:
    image: axllent/mailpit:latest
    container_name: eshop-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - eshop-network
    profiles:
      - development
      - sandbox


  # ============================================
  # PostgreSQL Exporter — Identity DB
  # ============================================
  postgres-exporter-identity:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: eshop-postgres-exporter-identity
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    ports:
      - "${PG_EXPORTER_IDENTITY_PORT:-9187}:9187"
    networks:
      - eshop-network
    profiles:
      - monitoring

  # ============================================
  # PostgreSQL Exporter — Catalog DB
  # ============================================
  postgres-exporter-catalog:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: eshop-postgres-exporter-catalog
    restart: unless-stopped
    depends_on:
      catalog-postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: "postgresql://${CATALOG_POSTGRES_USER}:${CATALOG_POSTGRES_PASSWORD}@catalog-postgres:5432/${CATALOG_POSTGRES_DB}?sslmode=disable"
    ports:
      - "${PG_EXPORTER_CATALOG_PORT:-9188}:9187"
    networks:
      - eshop-network
    profiles:
      - monitoring

  # ============================================
  # PostgreSQL Exporter — Ordering DB
  # ============================================
  postgres-exporter-ordering:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: eshop-postgres-exporter-ordering
    restart: unless-stopped
    depends_on:
      ordering-postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: "postgresql://${ORDERING_POSTGRES_USER}:${ORDERING_POSTGRES_PASSWORD}@ordering-postgres:5432/${ORDERING_POSTGRES_DB}?sslmode=disable"
    ports:
      - "${PG_EXPORTER_ORDERING_PORT:-9189}:9187"
    networks:
      - eshop-network
    profiles:
      - monitoring

  # ============================================
  # PostgreSQL Exporter — Payment DB
  # ============================================
  postgres-exporter-payment:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: eshop-postgres-exporter-payment
    restart: unless-stopped
    depends_on:
      payment-postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: "postgresql://${PAYMENT_POSTGRES_USER:-postgres}:${PAYMENT_POSTGRES_PASSWORD:-postgres}@payment-postgres:5432/${PAYMENT_POSTGRES_DB:-eshop_payment}?sslmode=disable"
    ports:
      - "${PG_EXPORTER_PAYMENT_PORT:-9190}:9187"
    networks:
      - eshop-network
    profiles:
      - monitoring

  # ============================================
  # Redis Exporter (Prometheus Metrics)
  # ============================================
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: eshop-redis-exporter
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "${REDIS_EXPORTER_PORT:-9121}:9121"
    networks:
      - eshop-network
    profiles:
      - monitoring

  # ============================================
  # RedisInsight - Modern Redis GUI (recommended)
  # ============================================
  redis-insight:
    image: redis/redisinsight:latest
    container_name: eshop-redis-insight
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      # RedisInsight configuration
      REDISINSIGHT_HOST: 0.0.0.0
      REDISINSIGHT_PORT: 5540
    ports:
      - "${REDIS_INSIGHT_PORT:-8001}:5540"
    volumes:
      - redis-insight-data:/data
    networks:
      - eshop-network
    profiles:
      - development
      - monitoring

  # ============================================
  # Redis Commander (Web UI for Redis - alternative)
  # ============================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: eshop-redis-commander
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD}
    ports:
      - "${REDIS_COMMANDER_PORT:-8081}:8081"
    networks:
      - eshop-network
    profiles:
      - development
      - monitoring

  # ============================================
  # Seq - Centralized Structured Logging
  # ============================================
  seq:
    image: datalust/seq:2025.1
    container_name: eshop-seq
    restart: unless-stopped
    ports:
      - "${SEQ_UI_PORT:-5341}:80"      # Web UI and ingestion
      - "${SEQ_INGEST_PORT:-5342}:5341" # Ingestion only
    environment:
      ACCEPT_EULA: Y
      SEQ_FIRSTRUN_ADMINUSERNAME: ${SEQ_ADMIN_USERNAME:-admin}
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_ADMIN_PASSWORD:-qweasdz1}
    volumes:
      - seq-data:/data
    networks:
      - eshop-network
    profiles:
      - monitoring

  # ============================================
  # Prometheus (Metrics Collection)
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: eshop-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      # Use existing infrastructure config if available, fallback to monitoring
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/prometheus/recording-rules.yml:/etc/prometheus/recording-rules.yml:ro
      - ./monitoring/prometheus-alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    networks:
      - eshop-network
    profiles:
      - monitoring

  # ============================================
  # Grafana (Visualization)
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: eshop-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - seq
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: false
      GF_INSTALL_PLUGINS: yesoreyeram-infinity-datasource
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      # Use existing infrastructure config if available, fallback to monitoring
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - eshop-network
    profiles:
      - monitoring

# ============================================
# Networks
# ============================================
networks:
  eshop-network:
    name: eshop-network
    driver: bridge

# ============================================
# Volumes
# ============================================
volumes:
  postgres-data:
    name: eshop-postgres-data
  catalog-postgres-data:
    name: eshop-catalog-postgres-data
  rabbitmq-data:
    name: eshop-rabbitmq-data
  redis-data:
    name: eshop-redis-data
  redis-insight-data:
    name: eshop-redis-insight-data
  identity-logs:
    name: eshop-identity-logs
  catalog-logs:
    name: eshop-catalog-logs
  ordering-postgres-data:
    name: eshop-ordering-postgres-data
  payment-postgres-data:
    name: eshop-payment-postgres-data
  notification-postgres-data:
    name: eshop-notification-postgres-data
  ordering-logs:
    name: eshop-ordering-logs
  payment-logs:
    name: eshop-payment-logs
  notification-logs:
    name: eshop-notification-logs
  basket-logs:
    name: eshop-basket-logs
  seq-data:
    name: eshop-seq-data
  prometheus-data:
    name: eshop-prometheus-data
  grafana-data:
    name: eshop-grafana-data
  jaeger-data:
    name: eshop-jaeger-data
