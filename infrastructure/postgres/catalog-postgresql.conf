# ============================================
# PostgreSQL Configuration for Catalog Service
# Optimized for high-volume read workloads
# ============================================

#------------------------------------------------------------------------------
# CONNECTION SETTINGS
#------------------------------------------------------------------------------
max_connections = 120
listen_addresses = '*'

#------------------------------------------------------------------------------
# MEMORY SETTINGS (higher than Identity due to larger dataset)
#------------------------------------------------------------------------------
shared_buffers = 512MB
effective_cache_size = 1536MB
work_mem = 16MB
maintenance_work_mem = 64MB

#------------------------------------------------------------------------------
# QUERY TUNING (SSD-optimized)
#------------------------------------------------------------------------------
random_page_cost = 1.1
seq_page_cost = 1.0
effective_io_concurrency = 200

#------------------------------------------------------------------------------
# WRITE-AHEAD LOG (WAL)
#------------------------------------------------------------------------------
wal_buffers = 16MB
checkpoint_completion_target = 0.9
max_wal_size = 1GB
min_wal_size = 80MB

#------------------------------------------------------------------------------
# LOGGING
#------------------------------------------------------------------------------
log_min_duration_statement = 1000
log_line_prefix = '%t [%p]: user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on

#------------------------------------------------------------------------------
# STATISTICS
#------------------------------------------------------------------------------
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all
