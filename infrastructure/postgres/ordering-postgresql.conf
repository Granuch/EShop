# ============================================
# PostgreSQL Configuration for Ordering Service
# Optimized for mixed read/write transactional workloads
# ============================================

#------------------------------------------------------------------------------
# CONNECTION SETTINGS
#------------------------------------------------------------------------------
max_connections = 120
listen_addresses = '*'

#------------------------------------------------------------------------------
# MEMORY SETTINGS
#------------------------------------------------------------------------------
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 8MB
maintenance_work_mem = 64MB

#------------------------------------------------------------------------------
# QUERY TUNING (SSD-optimized)
#------------------------------------------------------------------------------
random_page_cost = 1.1
seq_page_cost = 1.0
effective_io_concurrency = 200

#------------------------------------------------------------------------------
# WRITE-AHEAD LOG (WAL) - tuned for transactional writes
#------------------------------------------------------------------------------
wal_buffers = 16MB
checkpoint_completion_target = 0.9
max_wal_size = 1GB
min_wal_size = 80MB

#------------------------------------------------------------------------------
# LOGGING
#------------------------------------------------------------------------------
log_min_duration_statement = 1000
log_line_prefix = '%t [%p]: user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on

#------------------------------------------------------------------------------
# STATISTICS
#------------------------------------------------------------------------------
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all
