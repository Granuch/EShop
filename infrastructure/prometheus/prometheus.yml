# Prometheus configuration for EShop microservices
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'eshop'
    environment: 'production'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - alertmanager:9093

# Load alert rules and recording rules
rule_files:
  - 'alerts.yml'
  - 'recording-rules.yml'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # EShop Identity Service - Instance 1 (Docker network)
  # Note: 'service' label is NOT set here — the app emits service='identity' via UseHttpMetrics.
  # Setting a different value here would cause Prometheus to rename the app label to exported_service.
  - job_name: 'identity-api-1'
    metrics_path: '/prometheus'
    static_configs:
      - targets: ['identity-api:8080']
    scrape_interval: 15s
    scrape_timeout: 10s

  # Redis Exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'
    scrape_interval: 15s
    scrape_timeout: 10s

  # EShop Catalog Service
  # Note: 'service' label is NOT set here — the app emits service='catalog' via UseHttpMetrics.
  # Setting a different value here would cause Prometheus to rename the app label to exported_service.
  - job_name: 'catalog-api'
    metrics_path: '/prometheus'
    static_configs:
      - targets: ['catalog-api:8080']
    scrape_interval: 15s
    scrape_timeout: 10s

  # EShop Basket Service (when ready)
  # - job_name: 'basket-service'
  #   metrics_path: '/prometheus'
  #   static_configs:
  #     - targets: ['basket-api:8080']

  # EShop Ordering Service (when ready)
  # - job_name: 'ordering-service'
  #   metrics_path: '/prometheus'
  #   static_configs:
  #     - targets: ['ordering-api:8080']

  # ============================================
  # OpenTelemetry metrics (runtime, kestrel, http.server)
  # Scraped from /metrics (OTel Prometheus exporter endpoint)
  # These complement prometheus-net business metrics at /prometheus
  # ============================================
  - job_name: 'identity-api-otel'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['identity-api:8080']
    scrape_interval: 30s
    scrape_timeout: 10s

  - job_name: 'catalog-api-otel'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['catalog-api:8080']
    scrape_interval: 30s
    scrape_timeout: 10s

  # ============================================
  # OTEL Collector span-derived metrics (spanmetrics connector)
  # These power the Jaeger SPM Monitor tab.
  # Metrics: calls_total, duration_milliseconds_*
  # ============================================
  - job_name: 'otel-collector-spanmetrics'
    static_configs:
      - targets: ['otel-collector:8889']
    scrape_interval: 15s
    scrape_timeout: 10s
