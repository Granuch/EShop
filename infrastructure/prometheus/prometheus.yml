# Prometheus configuration for EShop microservices
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'eshop'
    environment: 'production'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - alertmanager:9093

# Load alert rules
rule_files:
  - 'alerts.yml'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # EShop Identity Service - Instance 1 (Docker network)
  - job_name: 'identity-api-1'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['identity-api:8080']
        labels:
          service: 'identity-api'
          instance: '1'
    scrape_interval: 15s
    scrape_timeout: 10s

  # EShop Identity Service - Instance 2 (if multi-instance enabled)
  - job_name: 'identity-api-2'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['identity-api-2:8080']
        labels:
          service: 'identity-api'
          instance: '2'
    scrape_interval: 15s
    scrape_timeout: 10s

  # Redis Exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'
    scrape_interval: 15s
    scrape_timeout: 10s

  # EShop Catalog Service
  - job_name: 'catalog-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['catalog-api:8080']
        labels:
          service: 'catalog-api'
    scrape_interval: 15s
    scrape_timeout: 10s

  # EShop Basket Service (when ready)
  # - job_name: 'basket-service'
  #   metrics_path: '/metrics'
  #   static_configs:
  #     - targets: ['basket-api:8080']

  # EShop Ordering Service (when ready)
  # - job_name: 'ordering-service'
  #   metrics_path: '/metrics'
  #   static_configs:
  #     - targets: ['ordering-api:8080']
