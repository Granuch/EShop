# Prometheus Alert Rules for EShop Microservices

groups:
  - name: identity_api_alerts
    interval: 30s
    rules:
      # Identity API is down
      - alert: IdentityAPIDown
        expr: up{job=~"identity-api.*"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Identity API instance {{ $labels.instance }} is down"
          description: "Identity API instance {{ $labels.instance }} has been down for more than 1 minute."

      # High login failure rate
      - alert: HighLoginFailureRate
        expr: rate(identity_login_attempts_total{status="failure"}[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High login failure rate detected"
          description: "Login failure rate is {{ $value }} failures/sec over 5 minutes."

      # Distributed brute-force attack detected
      - alert: DistributedBruteForceAttack
        expr: rate(identity_distributed_attacks_detected_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Distributed brute-force attack detected"
          description: "Identity service is detecting distributed brute-force attacks ({{ $value }} attacks/sec)."

      # High account lockout rate
      - alert: HighAccountLockoutRate
        expr: rate(identity_bruteforce_attempts_total{event_type="account_locked"}[5m]) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High account lockout rate"
          description: "Account lockout rate is {{ $value }} lockouts/sec over 5 minutes."

      # High IP block rate
      - alert: HighIpBlockRate
        expr: rate(identity_bruteforce_attempts_total{event_type="ip_blocked"}[5m]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High IP block rate detected"
          description: "IP blocking rate is {{ $value }} blocks/sec. Possible DDoS attack."

      # Many active account locks
      - alert: ManyActiveAccountLocks
        expr: identity_account_locks_active > 50
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Many active account locks"
          description: "{{ $value }} accounts are currently locked. Possible coordinated attack."

  - name: catalog_api_alerts
    interval: 30s
    rules:
      # Catalog API is down
      - alert: CatalogAPIDown
        expr: up{job="catalog-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Catalog API is down"
          description: "Catalog API has been down for more than 1 minute."

      # Catalog API high error rate (5xx responses)
      - alert: CatalogHighErrorRate
        expr: rate(http_requests_received_total{code=~"5..",service="catalog"}[5m]) / rate(http_requests_received_total{service="catalog"}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Catalog API high error rate"
          description: "Catalog API 5xx error rate is {{ $value | humanizePercentage }} over 5 minutes."

      # Catalog API high latency
      - alert: CatalogHighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{service="catalog"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Catalog API high latency"
          description: "Catalog API 95th percentile latency is {{ $value }}s over 5 minutes."

  - name: ordering_api_alerts
    interval: 30s
    rules:
      # Ordering API is down
      - alert: OrderingAPIDown
        expr: up{job="ordering-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Ordering API is down"
          description: "Ordering API has been down for more than 1 minute."

      # Ordering API high error rate (5xx responses)
      - alert: OrderingHighErrorRate
        expr: rate(http_requests_received_total{code=~"5..",service="ordering"}[5m]) / rate(http_requests_received_total{service="ordering"}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Ordering API high error rate"
          description: "Ordering API 5xx error rate is {{ $value | humanizePercentage }} over 5 minutes."

      # Ordering API high latency
      - alert: OrderingHighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{service="ordering"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Ordering API high latency"
          description: "Ordering API 95th percentile latency is {{ $value }}s over 5 minutes."

  - name: redis_alerts
    interval: 30s
    rules:
      # Redis is down
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis has been down for more than 1 minute."

      # High Redis memory usage
      - alert: RedisHighMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis high memory usage"
          description: "Redis is using {{ $value | humanizePercentage }} of max memory."

      # Too many Redis connections
      - alert: RedisTooManyConnections
        expr: redis_connected_clients > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis has too many connections"
          description: "Redis has {{ $value }} connected clients."

      # Redis slow commands
      - alert: RedisSlowCommands
        expr: rate(redis_slowlog_length[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis has slow commands"
          description: "Redis is experiencing slow commands at rate {{ $value }}."

  - name: system_alerts
    interval: 30s
    rules:
      # Database connection issues
      - alert: DatabaseConnectionFailures
        expr: rate(identity_login_attempts_total{status="failure",reason="database_error"}[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Database connection failures detected"
          description: "Database connection failures at rate {{ $value }}/sec."

  # ============================================
  # SLO Burn Rate Alerts (Multi-Window)
  # Target SLO: 99.9% availability → error budget = 0.1%
  #
  # Uses Google SRE multi-window, multi-burn-rate approach:
  # - Fast burn: 14.4× budget consumption rate → 100% budget gone in ~5h
  # - Slow burn: 6× budget consumption rate → 100% budget gone in ~5d
  # ============================================
  - name: slo_burn_rate_alerts
    interval: 30s
    rules:
      # Fast burn: severe outage, pages immediately
      # 5m window confirms it's not a single retry; 30m window confirms sustained
      - alert: SLOBudgetBurnFast
        expr: >
          service:slo_errors_per_request:ratio_rate5m > (14.4 * 0.001)
            and
          service:slo_errors_per_request:ratio_rate30m > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "SLO budget burn rate critical for {{ $labels.service }}"
          description: >
            Service {{ $labels.service }} is consuming error budget at >14.4× rate.
            At this rate, 100% of the 30-day error budget will be exhausted in ~5 hours.
            Current 5m error ratio: {{ $value | humanizePercentage }}.

      # Slow burn: gradual degradation, warns before budget exhaustion
      # 1h + 6h windows detect sustained elevated error rates
      - alert: SLOBudgetBurnSlow
        expr: >
          service:slo_errors_per_request:ratio_rate1h > (6 * 0.001)
            and
          service:slo_errors_per_request:ratio_rate6h > (6 * 0.001)
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "SLO budget slow burn for {{ $labels.service }}"
          description: >
            Service {{ $labels.service }} is consuming error budget at >6× rate.
            At this rate, 100% of the 30-day error budget will be exhausted in ~5 days.
            Current 1h error ratio: {{ $value | humanizePercentage }}.

      # QPS drop — possible deployment failure or upstream issue
      - alert: RequestRateDrop
        expr: >
          service:http_requests:rate5m < 0.1
            and
          service:http_requests:rate5m offset 1h > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Request rate dropped significantly for {{ $labels.service }}"
          description: >
            Service {{ $labels.service }} request rate dropped to {{ $value }}/sec
            from over 1/sec an hour ago. Possible deployment issue or upstream failure.

  # ============================================
  # Runtime & Infrastructure Alerts
  # ============================================
  - name: runtime_alerts
    interval: 30s
    rules:
      # GC pause time consuming >5% of wall clock time
      - alert: HighGCPauseTime
        expr: instance:dotnet_gc_pause:rate5m > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High GC pause time on {{ $labels.job }}"
          description: >
            GC is consuming {{ $value | humanizePercentage }} of wall clock time
            on {{ $labels.job }} / {{ $labels.instance }}.

      # Thread pool queue growing — sign of saturation
      - alert: ThreadPoolSaturation
        expr: instance:dotnet_threadpool_queue_length:rate5m > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Thread pool saturated on {{ $labels.job }}"
          description: >
            Thread pool queue growth rate is {{ $value }}/sec on {{ $labels.job }}.
            Work items are queuing faster than threads can process.

      # Exception rate spike
      - alert: HighExceptionRate
        expr: instance:dotnet_exceptions:rate5m > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High exception rate on {{ $labels.job }}"
          description: >
            {{ $labels.job }} is throwing {{ $value }} exceptions/sec.

      # DB connection creation latency spike (P95 > 1s)
      - alert: DatabaseConnectionLatencyHigh
        expr: instance:npgsql_connection_create_p95:rate5m > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Database connection latency high for {{ $labels.job }}"
          description: >
            P95 database connection creation time is {{ $value }}s for {{ $labels.job }}.
            Possible connection pool exhaustion or database overload.

      # OTEL Collector down
      - alert: OTELCollectorDown
        expr: up{job="otel-collector-spanmetrics"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "OpenTelemetry Collector is down"
          description: "OTEL Collector has been unreachable for >2 minutes. Traces and span metrics are not being collected."

  # ============================================
  # Dependency RED Alerts
  # ============================================
  - name: dependency_alerts
    interval: 30s
    rules:
      # Upstream dependency returning 5xx errors
      - alert: DependencyHighErrorRate
        expr: dependency:http_client_error_ratio:rate5m > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Upstream dependency {{ $labels.server_address }} returning errors for {{ $labels.job }}"
          description: >
            {{ $labels.job }} → {{ $labels.server_address }}: {{ $value | humanizePercentage }} of requests are 5xx.

      # Upstream dependency latency spike
      - alert: DependencyHighLatency
        expr: dependency:http_client_latency_p95:rate5m > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Upstream dependency {{ $labels.server_address }} slow for {{ $labels.job }}"
          description: >
            {{ $labels.job }} → {{ $labels.server_address }}: P95 latency is {{ $value }}s.

      # DB query latency spike
      - alert: DatabaseQueryLatencyHigh
        expr: dependency:db_operation_latency_p95:rate5m > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Database query latency high for {{ $labels.job }}"
          description: >
            {{ $labels.job }} DB operation P95 latency is {{ $value }}s.

      # DB connection pool nearing exhaustion (>80% used)
      - alert: DatabasePoolExhaustion
        expr: dependency:db_pool_utilization:ratio > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool nearing exhaustion for {{ $labels.job }}"
          description: >
            {{ $labels.job }} is using {{ $value | humanizePercentage }} of its DB connection pool.

  # ============================================
  # PostgreSQL Server Alerts
  # ============================================
  - name: postgres_alerts
    interval: 30s
    rules:
      # PostgreSQL exporter down
      - alert: PostgresExporterDown
        expr: up{job=~"postgres-.*"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL exporter {{ $labels.job }} is down"
          description: "Cannot scrape metrics from {{ $labels.job }} for >2 minutes."

      # Buffer cache hit ratio dropped (< 95%)
      - alert: PostgresCacheHitLow
        expr: postgres:cache_hit_ratio:rate5m < 0.95
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL cache hit ratio low on {{ $labels.job }}"
          description: >
            {{ $labels.job }} ({{ $labels.datname }}): buffer cache hit ratio is {{ $value | humanizePercentage }}.
            Should be >99%. Consider increasing shared_buffers.

      # Too many connections (>80% of max)
      - alert: PostgresTooManyConnections
        expr: >
          sum by (job) (pg_stat_activity_count)
          / on (job) pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL {{ $labels.job }} nearing connection limit"
          description: >
            {{ $labels.job }}: {{ $value | humanizePercentage }} of max_connections used.

      # Deadlocks detected
      - alert: PostgresDeadlocks
        expr: postgres:deadlocks:rate5m > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Deadlocks detected on {{ $labels.job }}"
          description: >
            {{ $labels.job }} ({{ $labels.datname }}): {{ $value }} deadlocks/sec.

      # High rollback rate (>5% of transactions)
      - alert: PostgresHighRollbackRate
        expr: >
          postgres:transactions_rolledback:rate5m
          / (postgres:transactions_committed:rate5m + postgres:transactions_rolledback:rate5m) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High rollback rate on {{ $labels.job }}"
          description: >
            {{ $labels.job }} ({{ $labels.datname }}): {{ $value | humanizePercentage }} of transactions are rolled back.

      # High sequential scan rate (indicator of missing indexes or cache)
      - alert: PostgresSequentialScanHigh
        expr: rate(pg_stat_user_tables_seq_scan{relname="products"}[5m]) > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High sequential scan rate on Products table"
          description: >
            {{ $labels.relname }} on {{ $labels.job }} has {{ $value }} seq scans/s — consider adding cache or index.

      # Slow query detection via Npgsql command duration
      - alert: PostgresSlowQueries
        expr: >
          histogram_quantile(0.95,
            rate(db_client_operation_duration_seconds_bucket[5m])
          ) > 0.100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL P95 query latency >100ms on {{ $labels.job }}"
          description: >
            Slow queries detected on {{ $labels.job }}: P95 = {{ $value }}s.

      # Npgsql connection pool saturation
      - alert: PostgresConnectionPoolSaturation
        expr: >
          db_client_connections_usage{state="used"}
          / ignoring(state) db_client_connections_max > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Npgsql connection pool >85% utilized on {{ $labels.job }}"
          description: >
            Pool saturation on {{ $labels.job }} — consider increasing MaxPoolSize.

  # ============================================
  # .NET Application Memory & GC Alerts
  # ============================================
  - name: dotnet_memory_alerts
    interval: 30s
    rules:
      # Service memory high (>700 MB)
      - alert: ServiceMemoryHigh
        expr: process_resident_memory_bytes{job=~".*-api.*"} > 700000000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Service {{ $labels.job }} memory usage high"
          description: >
            {{ $labels.job }} using {{ $value | humanize1024 }}B (>700MB threshold).

      # Service memory critical (>900 MB, near OOM)
      - alert: ServiceMemoryCritical
        expr: process_resident_memory_bytes{job=~".*-api.*"} > 900000000
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} approaching OOM"
          description: >
            {{ $labels.job }} using {{ $value | humanize1024 }}B (>900MB, near 1GB limit).

      # High GC pressure (>10% time in GC)
      - alert: HighGCPressure
        expr: rate(dotnet_gc_pause_total_seconds[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High GC pressure on {{ $labels.job }}"
          description: >
            {{ $labels.job }} spending {{ $value | humanizePercentage }} of time in GC.

      # Frequent Gen2 collections (memory pressure indicator)
      - alert: FrequentGen2Collections
        expr: rate(dotnet_gc_collections_total{gc_generation="2"}[5m]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Frequent Gen2 GC on {{ $labels.job }}"
          description: >
            {{ $labels.job }} has {{ $value }} Gen2 collections/sec (indicates memory pressure).
