# Docker Compose for Observability Stack (Seq, Prometheus, Grafana)
# Usage: docker-compose -f docker-compose.observability.yml up -d

services:
  # Seq - Centralized structured logging
  seq:
    image: datalust/seq:2025.1
    container_name: eshop-seq
    ports:
      - "5341:80"      # Web UI and ingestion
      - "5342:5341"    # Ingestion only (for production)
    environment:
      - ACCEPT_EULA=Y
    volumes:
      - seq-data:/data
    restart: unless-stopped
    networks:
      - eshop-observability

  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: eshop-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - eshop-observability

  # Grafana - Dashboards and visualization
  grafana:
    image: grafana/grafana:latest
    container_name: eshop-grafana
    ports:
        - "3000:3000"
    environment:
        - GF_SECURITY_ADMIN_USER=admin
        - GF_SECURITY_ADMIN_PASSWORD=admin
        - GF_USERS_ALLOW_SIGN_UP=false
        - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
    volumes:
        - grafana-data:/var/lib/grafana
        - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
        - prometheus
        - seq
    restart: unless-stopped
    networks:
        - eshop-observability

volumes:
  seq-data:
  prometheus-data:
  grafana-data:

networks:
  eshop-observability:
    driver: bridge