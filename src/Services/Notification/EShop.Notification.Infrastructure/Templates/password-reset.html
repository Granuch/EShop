<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Reset</title>
</head>
<body style="margin:0;padding:0;background:#f5f7fb;font-family:Arial,Helvetica,sans-serif;color:#1f2937;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px 0;">
        <tr>
            <td align="center">
                <table role="presentation" width="620" cellspacing="0" cellpadding="0" style="background:#ffffff;border-radius:8px;overflow:hidden;">
                    <tr>
                        <td style="background:#4f46e5;padding:20px 24px;color:#ffffff;font-size:22px;font-weight:700;">EShop</td>
                    </tr>
                    <tr>
                        <td style="padding:24px;">
                            <h1 style="margin:0 0 12px;font-size:22px;">Password reset request</h1>
                            <p style="margin:0 0 16px;line-height:1.5;">Hello {{CustomerName}}, we received a request to reset your password.</p>
                            <p style="margin:0 0 24px;line-height:1.5;">If you made this request, click the button below to create a new password.</p>
                            <p style="margin:0 0 24px;">
                                <a href="{{ResetLink}}" style="display:inline-block;background:#4f46e5;color:#ffffff;text-decoration:none;padding:12px 18px;border-radius:6px;font-weight:600;">Reset password</a>
                            </p>
                            <p style="margin:0;line-height:1.5;color:#6b7280;">If you did not request a reset, you can safely ignore this email.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
