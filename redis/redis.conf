# Redis Production Configuration for EShop Identity Service
# Optimized for brute-force protection caching

# ========================================
# NETWORK
# ========================================
bind 0.0.0.0
protected-mode yes
port 6379
tcp-backlog 511
timeout 300
tcp-keepalive 300

# ========================================
# GENERAL
# ========================================
daemonize no
supervised no
pidfile /var/run/redis_6379.pid
loglevel notice
logfile ""
databases 16

# ========================================
# SNAPSHOTTING (RDB Persistence)
# ========================================
# Save the DB on disk:
#   save <seconds> <changes>
#   Will save the DB if both the given number of seconds and changes occurred
save 900 1      # After 900 sec (15 min) if at least 1 key changed
save 300 10     # After 300 sec (5 min) if at least 10 keys changed
save 60 10000   # After 60 sec if at least 10000 keys changed

stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# ========================================
# APPEND ONLY FILE (AOF Persistence)
# ========================================
# AOF provides better durability than RDB
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec  # fsync every second (good balance)
# appendfsync always  # fsync every write (slower but safest)
# appendfsync no      # let OS decide when to fsync (fastest but least safe)

no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# ========================================
# MEMORY MANAGEMENT
# ========================================
maxmemory 256mb
maxmemory-policy allkeys-lru
# Available policies:
#   noeviction       - Return errors when memory limit reached
#   allkeys-lru      - Evict any key using LRU algorithm (RECOMMENDED for cache)
#   volatile-lru     - Evict keys with TTL using LRU
#   allkeys-random   - Evict random keys
#   volatile-random  - Evict random keys with TTL
#   volatile-ttl     - Evict keys with TTL, shortest TTL first

maxmemory-samples 5

# ========================================
# LAZY FREEING
# ========================================
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no

# ========================================
# SECURITY
# ========================================
# Password authentication
# Set via command line: --requirepass <password>
# Or uncomment below (not recommended, use environment variable)
# requirepass ChangeMeInProduction

# Disable dangerous commands
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG "CONFIG_ADMIN_ONLY"
rename-command SHUTDOWN "SHUTDOWN_ADMIN_ONLY"

# ========================================
# CLIENTS
# ========================================
maxclients 10000

# ========================================
# SLOW LOG
# ========================================
slowlog-log-slower-than 10000  # microseconds (10ms)
slowlog-max-len 128

# ========================================
# LATENCY MONITOR
# ========================================
latency-monitor-threshold 100  # milliseconds

# ========================================
# EVENT NOTIFICATION
# ========================================
notify-keyspace-events ""

# ========================================
# ADVANCED CONFIG
# ========================================
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000
stream-node-max-bytes 4096
stream-node-max-entries 100
activerehashing yes
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60
hz 10
dynamic-hz yes
aof-rewrite-incremental-fsync yes
rdb-save-incremental-fsync yes

# ========================================
# TLS/SSL (Production Only)
# ========================================
# Uncomment for TLS/SSL support
# port 0
# tls-port 6380
# tls-cert-file /etc/redis/certs/redis.crt
# tls-key-file /etc/redis/certs/redis.key
# tls-ca-cert-file /etc/redis/certs/ca.crt
# tls-auth-clients no
# tls-replication yes
# tls-protocols "TLSv1.2 TLSv1.3"
# tls-ciphers DEFAULT:!MEDIUM
# tls-prefer-server-ciphers yes
