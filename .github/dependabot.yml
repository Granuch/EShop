version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Kyiv"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "nuget"
    reviewers:
      - "Granuch"

    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

    rebase-strategy: auto

    groups:
      dotnet-runtime:
        patterns:
          - "Microsoft.NETCore.*"
          - "Microsoft.AspNetCore.*"
          - "System.*"
        update-types:
          - "minor"
          - "patch"

      entity-framework:
        patterns:
          - "Microsoft.EntityFrameworkCore*"
          - "Npgsql.EntityFrameworkCore*"
        update-types:
          - "minor"
          - "patch"

      messaging:
        patterns:
          - "MassTransit*"
          - "RabbitMQ*"
        update-types:
          - "minor"
          - "patch"

      cqrs:
        patterns:
          - "FluentValidation*"
          - "MediatR*"
        update-types:
          - "minor"
          - "patch"

      testing:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet*"
        update-types:
          - "minor"
          - "patch"

      identity:
        patterns:
          - "Microsoft.AspNetCore.Identity*"
          - "Microsoft.AspNetCore.Authentication*"
          - "Microsoft.IdentityModel*"
        update-types:
          - "minor"
          - "patch"

      caching:
        patterns:
          - "StackExchange.Redis"
          - "Microsoft.Extensions.Caching*"
        update-types:
          - "minor"
          - "patch"

      infrastructure:
        patterns:
          - "MailKit"
          - "MimeKit"
        update-types:
          - "minor"
          - "patch"

      internal-packages:
        patterns:
          - "EShop.BuildingBlocks.*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "ci(deps)"
    labels:
      - "dependencies"
      - "github-actions"
    rebase-strategy: auto

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(docker)"
    labels:
      - "dependencies"
      - "docker"
    rebase-strategy: auto
