name: CI

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ feature/**, main, develop ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore EShop.slnx

      - name: Build
        run: dotnet build EShop.slnx -c Release --no-restore

      - name: Test
        run: dotnet test EShop.slnx -c Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults

      - name: Validate docker compose config
        run: docker compose config > /tmp/docker-compose.resolved.yml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-test-results
          path: TestResults/**/*.trx
          if-no-files-found: warn
