name: Docker Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

concurrency:
  group: docker-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start docker stack (sandbox + monitoring)
        run: docker compose --profile sandbox --profile monitoring up -d --build

      - name: Wait for services warmup
        run: sleep 30

      - name: Run health audit
        shell: pwsh
        run: ./scripts/health-audit.ps1 -Tail 200 -SinceMinutes 10

      - name: Run gateway verification
        shell: pwsh
        run: ./scripts/gateway-verify-target.ps1 -Profile sandbox -GatewayBaseUrl http://localhost:7000 -SkipComposeUp

      - name: Collect docker status
        if: always()
        run: docker compose ps

      - name: Collect docker logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=300 > docker-smoke-logs.txt

      - name: Upload docker logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-smoke-logs
          path: docker-smoke-logs.txt
          if-no-files-found: ignore

      - name: Stop docker stack
        if: always()
        run: docker compose --profile sandbox --profile monitoring down -v --remove-orphans
